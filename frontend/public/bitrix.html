<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HR Спасибо — Bitrix24</title>
  <script src="https://api.bitrix24.com/api/v1/"></script>
</head>
<body>
  <p id="status">Подключение к Bitrix24…</p>
  <script>
(function () {
  var API_BASE = 'https://muglehrbottopmanagment-test.up.railway.app';

  function setStatus(text) {
    var el = document.getElementById('status');
    if (el) el.textContent = text;
  }

  function fail(msg) {
    setStatus(msg || 'Ошибка входа');
    if (typeof console !== 'undefined' && console.error) console.error(msg);
  }

  if (typeof BX24 === 'undefined') {
    fail('SDK Bitrix24 не загружен. Откройте страницу из портала Bitrix24 (меню приложения).');
    return;
  }

  BX24.init(function () {
    BX24.getAuth(function (auth) {
      if (!auth || !auth.access_token) {
        fail('Не удалось получить токен (BX24.getAuth).');
        return;
      }
      var domain = auth.domain || '';
      var memberId = auth.member_id || '';
      setStatus('Вход в HR Спасибо…');
      fetch(API_BASE + '/bitrix/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_token: auth.access_token,
          domain: domain,
          member_id: memberId
        })
      })
        .then(function (res) {
          return res.json().then(function (data) {
            return { ok: res.ok, status: res.status, data: data };
          });
        })
        .then(function (r) {
          if (!r.ok) {
            var d = r.data && r.data.detail;
            fail(typeof d === 'string' ? d : (r.data && r.data.detail ? JSON.stringify(r.data.detail) : 'Ошибка сервера (' + r.status + ')'));
            return;
          }
          if (r.data.user_id) {
            localStorage.setItem('userId', String(r.data.user_id));
            localStorage.setItem('user', JSON.stringify(r.data.user));
          }
          window.location.replace('/');
        })
        .catch(function (e) {
          fail(e && e.message ? e.message : 'Сеть недоступна');
        });
    });
  });
})();
  </script>
</body>
</html>
