<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HR Спасибо — Bitrix24</title>
  <style>
    #status { max-width: 36rem; margin: 1rem auto; padding: 0 1rem; font-family: system-ui, sans-serif; line-height: 1.45; white-space: pre-wrap; }
  </style>
</head>
<body>
  <!--
    Bitrix иногда редиректит OAuth на тот же URL, что и обработчик (Vercel bitrix.html?code=...).
    Тогда вкладка не в iframe — BX24 не инициализируется. Сразу передаём ответ на API (обмен code).
  -->
  <script>
(function () {
  try {
    var API_BASE = 'https://muglehrbottopmanagment-test.up.railway.app';
    var q = new URLSearchParams(window.location.search || '');
    var hasCode = q.get('code');
    var hasState = q.get('state');
    var hasOAuthError = q.get('error');
    if (hasOAuthError || (hasCode && hasState)) {
      window.location.replace(API_BASE + '/bitrix/oauth/callback?' + q.toString());
    }
  } catch (e) {}
})();
  </script>
  <p id="status">Загрузка Bitrix24…</p>
  <p id="oauthRow" style="display:none; margin-top:1rem; font-size:0.95rem;">
    <a id="oauthLink" href="#">Войти через Bitrix24 (OAuth) — если «Подключение…» не завершается</a>
  </p>
  <!--
    Скрипт api.bitrix24.com подключается с onload: иначе следующий inline мог выполниться
    до появления BX24 (приложение «не открывается» / «SDK не загружен»).
  -->
  <script>
(function () {
  var API_BASE = 'https://muglehrbottopmanagment-test.up.railway.app';

  function setStatus(text) {
    var el = document.getElementById('status');
    if (el) {
      el.textContent = text;
    }
  }

  function fail(msg) {
    setStatus(msg || 'Ошибка входа');
    if (typeof console !== 'undefined' && console.error) {
      console.error(msg);
    }
  }

  /** True, если переход был со страницы маркетплейса (там BX24.init часто не завершается). */
  function isMarketplaceReferrer() {
    try {
      var r = document.referrer || '';
      return /\/marketplace\//i.test(r) || /marketplace\.bitrix24\./i.test(r);
    } catch (e) {
      return false;
    }
  }

  /**
   * Bitrix может передать PLACEMENT в query iframe; в сценариях «маркет» handshake с родителем часто не завершается.
   */
  function isLikelyMarketplacePlacement() {
    if (isMarketplaceReferrer()) {
      return true;
    }
    try {
      var p = new URLSearchParams(window.location.search || '');
      var pl = (p.get('PLACEMENT') || '').toUpperCase();
      if (pl.indexOf('MARKET') >= 0) {
        return true;
      }
    } catch (e) {
      return false;
    }
    return false;
  }

  function whenDomReady(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }

  function bitrixInitHintSuffix() {
    if (isLikelyMarketplacePlacement()) {
      return (
        '\n\nОткройте «Спасибо» из левого меню портала (часто под «Ещё»), а не через страницу Маркетплейса ' +
        'и не кнопку «Перейти к приложению» в карточке — там URL вида .../marketplace/app/... и BX24.init может не ответить.'
      );
    }
    return '';
  }

  function initTimeoutMs() {
    return isLikelyMarketplacePlacement() ? 25000 : 45000;
  }

  function timeoutFailMessage() {
    return (
      'BX24.init не ответил за отведённое время.\n\n' +
      'Это не значит, что «Railway не отвечает Bitrix»: запрос к API на вход (/bitrix/session) ' +
      'отправляется только после успешного BX24.init и BX24.getAuth. Пока init завис, до сервера дело не доходит.\n\n' +
      'Если в адресной строке портала был путь .../marketplace/app/... — откройте приложение пунктом меню слева («Спасибо» / «Ещё»), не из витрины.\n\n' +
      'Установка приложения (поле «Путь для первоначальной установки» → /bitrix/install) — отдельный шаг; смотрите логи Railway на этот URL.\n\n' +
      'Если уже открываете из меню и ошибка повторяется: в DevTools → Network проверьте, есть ли POST .../bitrix/session. ' +
      'Если его нет — всё ещё проблема iframe/BX24. Если есть, но красный — проверьте CORS: Origin страницы Vercel должен быть в allow_origins API.'
    );
  }

  function postSession(auth) {
    var domain = auth.domain || '';
    var memberId = auth.member_id || '';
    setStatus('Вход в HR Спасибо…');
    fetch(API_BASE + '/bitrix/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: auth.access_token,
        domain: domain,
        member_id: memberId
      })
    })
      .then(function (res) {
        return res.json().then(function (data) {
          return { ok: res.ok, status: res.status, data: data };
        });
      })
      .then(function (r) {
        if (!r.ok) {
          var d = r.data && r.data.detail;
          fail(typeof d === 'string' ? d : (r.data && r.data.detail ? JSON.stringify(r.data.detail) : 'Ошибка сервера (' + r.status + ')'));
          return;
        }
        if (r.data.user_id) {
          localStorage.setItem('userId', String(r.data.user_id));
          localStorage.setItem('user', JSON.stringify(r.data.user));
        }
        window.location.replace('/');
      })
      .catch(function (e) {
        fail(e && e.message ? e.message : 'Сеть недоступна');
      });
  }

  function runBitrix() {
    var ms = initTimeoutMs();
    var initTimeout = window.setTimeout(function () {
      fail(timeoutFailMessage());
    }, ms);

    function callBx24Init() {
      BX24.init(function () {
        window.clearTimeout(initTimeout);
        if (typeof BX24.getAuth !== 'function') {
          fail('BX24.getAuth недоступен в этой версии портала.');
          return;
        }
        BX24.getAuth(function (auth) {
          if (!auth || !auth.access_token) {
            fail('Не удалось получить токен (BX24.getAuth).');
            return;
          }
          postSession(auth);
        });
      });
    }

    /* Документация Bitrix24: примеры вызывают BX24.init после готовности DOM; BX24.ready (если есть) — до init. */
    function startInit() {
      window.setTimeout(callBx24Init, 0);
    }

    if (typeof BX24.ready === 'function') {
      BX24.ready(startInit);
    } else {
      startInit();
    }
  }

  function afterExternalScriptLoaded() {
    try {
      if (window.self === window.top) {
        fail(
          'Приложение должно открываться внутри портала Bitrix24 (во встроенной области), а не в отдельной вкладке.\n\n' +
          'Закройте эту вкладку и откройте: левое меню портала → «Приложения» → ваше приложение.'
        );
        return;
      }
    } catch (e) {
      /* cross-origin: считаем, что мы во вложении */
    }
    setStatus('Подключение к Bitrix24…' + bitrixInitHintSuffix());
    var tries = 0;
    function waitBx() {
      if (typeof BX24 !== 'undefined') {
        runBitrix();
        return;
      }
      tries += 1;
      if (tries > 80) {
        fail('SDK Bitrix24 не загружен. Откройте приложение из меню портала Bitrix24.');
        return;
      }
      window.setTimeout(waitBx, 50);
    }
    whenDomReady(waitBx);
  }

  window.__hrBitrixOnSdkLoad = function () {
    afterExternalScriptLoaded();
  };
  window.__hrBitrixOnSdkError = function () {
    fail('Не удалось загрузить скрипт Bitrix24 (сеть или блокировка).');
  };

  function setupOAuthFallbackLink() {
    try {
      var domain = new URLSearchParams(window.location.search || '').get('DOMAIN') || '';
      if (!domain) {
        return;
      }
      fetch(API_BASE + '/bitrix/oauth/status')
        .then(function (res) {
          return res.json();
        })
        .then(function (data) {
          if (!data || !data.oauth_enabled) {
            return;
          }
          var row = document.getElementById('oauthRow');
          var a = document.getElementById('oauthLink');
          if (!row || !a) {
            return;
          }
          a.href = API_BASE + '/bitrix/oauth/start?domain=' + encodeURIComponent(domain);
          a.target = '_top';
          a.rel = 'noopener';
          row.style.display = 'block';
        })
        .catch(function () {});
    } catch (e) {}
  }

  whenDomReady(setupOAuthFallbackLink);
})();
  </script>
  <script src="https://api.bitrix24.com/api/v1/" onload="window.__hrBitrixOnSdkLoad()" onerror="window.__hrBitrixOnSdkError()"></script>
</body>
</html>
