<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HR Спасибо — Bitrix24</title>
  <style>
    #status { max-width: 36rem; margin: 1rem auto; padding: 0 1rem; font-family: system-ui, sans-serif; line-height: 1.45; white-space: pre-wrap; }
  </style>
</head>
<body>
  <!--
    Bitrix иногда редиректит OAuth на тот же URL, что и обработчик (Vercel bitrix.html?code=...).
    Тогда вкладка не в iframe — BX24 не инициализируется. Сразу передаём ответ на API (обмен code).
  -->
  <script>
(function () {
  try {
    var API_BASE = 'https://muglehrbottopmanagment-test.up.railway.app';
    var q = new URLSearchParams(window.location.search || '');
    var hasCode = q.get('code');
    var hasState = q.get('state');
    var hasOAuthError = q.get('error');
    if (hasOAuthError || (hasCode && hasState)) {
      window.location.replace(API_BASE + '/bitrix/oauth/callback?' + q.toString());
    }
  } catch (e) {}
})();
  </script>
  <p id="status">Загрузка Bitrix24…</p>
  <p id="oauthHint" style="display:none; max-width:36rem; margin:0.75rem auto 0; padding:0 1rem; font-family:system-ui,sans-serif; font-size:0.9rem; color:#444;">
    OAuth обходит зависание BX24.init в превью Маркета и в части iframe — можно нажать сразу, не дожидаясь таймаута.
  </p>
  <p id="oauthRow" style="display:none; margin-top:1rem; font-size:0.95rem;">
    <a id="oauthLink" href="#">Войти через Bitrix24 (OAuth) — если «Подключение…» не завершается</a>
  </p>
  <!--
    Скрипт BX24: как в документации — //api…/api/v1/ (протокол как у страницы).
    https://apidocs.bitrix24.ru/sdk/bx24-js-sdk/index.html
    Редко для другого контура указывают api.bitrix24.tech — при необходимости замените src ниже.
  -->
  <script>
(function () {
  var API_BASE = 'https://muglehrbottopmanagment-test.up.railway.app';

  function setStatus(text) {
    var el = document.getElementById('status');
    if (el) {
      el.textContent = text;
    }
  }

  function fail(msg) {
    setStatus(msg || 'Ошибка входа');
    if (typeof console !== 'undefined' && console.error) {
      console.error(msg);
    }
  }

  /** True, если переход был со страницы маркетплейса (там BX24.init часто не завершается). */
  function isMarketplaceReferrer() {
    try {
      var r = document.referrer || '';
      return /\/marketplace\//i.test(r) || /marketplace\.bitrix24\./i.test(r);
    } catch (e) {
      return false;
    }
  }

  /**
   * Bitrix может передать PLACEMENT / контекст в query iframe; в превью Маркета handshake с родителем часто не завершается.
   * Referrer часто пустой (HTTPS / переход из карточки), поэтому смотрим ещё параметры.
   */
  function isLikelyMarketplacePlacement() {
    if (isMarketplaceReferrer()) {
      return true;
    }
    try {
      var p = new URLSearchParams(window.location.search || '');
      var pl = (p.get('PLACEMENT') || '').toUpperCase();
      if (pl.indexOf('MARKET') >= 0) {
        return true;
      }
      /* Иногда в опциях передаётся JSON с типом размещения */
      var po = p.get('PLACEMENT_OPTIONS') || '';
      if (po && /market|витрин|slider|marketplace/i.test(po)) {
        return true;
      }
      /* Открытие из витрины: в адресе портала часто .../marketplace/app/... — родитель не читаем, но пользователь видит подсказку по OAuth */
    } catch (e) {
      return false;
    }
    return false;
  }

  function whenDomReady(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }

  function bitrixInitHintSuffix() {
    if (isLikelyMarketplacePlacement()) {
      return (
        '\n\nОткройте «Спасибо» из левого меню портала (часто под «Ещё»), а не через страницу Маркетплейса ' +
        'и не кнопку «Перейти к приложению» в карточке — там URL вида .../marketplace/app/... и BX24.init может не ответить.'
      );
    }
    return '';
  }

  function initTimeoutMs() {
    /* Основной обход зависания в Маркете — OAuth; таймаут только информирует. */
    return 60000;
  }

  function timeoutFailMessage() {
    return (
      'BX24.init не ответил за отведённое время.\n\n' +
      'По документации Bitrix24, JS-библиотека BX24.js нужна только если интерфейс открыт ' +
      'внутри портала (iframe), а не для «голого» вебхука: ' +
      'https://apidocs.bitrix24.ru/sdk/bx24-js-sdk/index.html\n\n' +
      'BX24.init запрашивает данные у родительского окна портала; в превью Маркета (.../marketplace/app/...) ' +
      'и в части встроек обмен с родителем не завершается — callback init не вызывается. ' +
      'Это не ошибка Railway: POST /bitrix/session уходит только после успешных BX24.init и BX24.getAuth.\n\n' +
      'Что проверить:\n' +
      '• Откройте приложение пунктом левого меню («Спасибо» / «Ещё»), не из витрины Маркета.\n' +
      '• В карточке локального приложения: «Путь обработчика» = URL bitrix.html на Vercel (как в браузере), ' +
      '«Путь установки» = …/bitrix/install на API (см. также обзор: ' +
      'https://b24.org.ru/lokalnye-prilozheniya-bitriks24-v-2025/ ).\n' +
      '• В Network: есть ли POST .../bitrix/session. Нет — проблема iframe/SDK; есть, но красный — CORS на API.\n\n' +
      'Ниже — вход через OAuth (полный OAuth 2.0), если встроенный SDK так и не заработал.'
    );
  }

  /** Кэш ответа /bitrix/oauth/status, чтобы при таймауте init не дёргать повторно. */
  var oauthEnabledCache = null;

  function getDomainFromQuery() {
    try {
      return new URLSearchParams(window.location.search || '').get('DOMAIN') || '';
    } catch (e) {
      return '';
    }
  }

  function showOAuthFallbackUi() {
    try {
      var domain = getDomainFromQuery();
      if (!domain) {
        return;
      }
      var row = document.getElementById('oauthRow');
      var a = document.getElementById('oauthLink');
      var hint = document.getElementById('oauthHint');
      if (!row || !a) {
        return;
      }
      a.href = API_BASE + '/bitrix/oauth/start?domain=' + encodeURIComponent(domain);
      a.target = '_top';
      a.rel = 'noopener';
      row.style.display = 'block';
      if (hint) {
        hint.style.display = 'block';
      }
    } catch (e) {}
  }

  function fetchOAuthEnabled() {
    if (oauthEnabledCache !== null) {
      return Promise.resolve(oauthEnabledCache);
    }
    return fetch(API_BASE + '/bitrix/oauth/status')
      .then(function (res) {
        return res.json();
      })
      .then(function (data) {
        oauthEnabledCache = !!(data && data.oauth_enabled);
        return oauthEnabledCache;
      })
      .catch(function () {
        oauthEnabledCache = false;
        return false;
      });
  }

  function postSession(auth) {
    var domain = auth.domain || '';
    var memberId = auth.member_id || '';
    setStatus('Вход в HR Спасибо…');
    fetch(API_BASE + '/bitrix/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: auth.access_token,
        domain: domain,
        member_id: memberId
      })
    })
      .then(function (res) {
        return res.json().then(function (data) {
          return { ok: res.ok, status: res.status, data: data };
        });
      })
      .then(function (r) {
        if (!r.ok) {
          var d = r.data && r.data.detail;
          fail(typeof d === 'string' ? d : (r.data && r.data.detail ? JSON.stringify(r.data.detail) : 'Ошибка сервера (' + r.status + ')'));
          return;
        }
        if (r.data.user_id) {
          localStorage.setItem('userId', String(r.data.user_id));
          localStorage.setItem('user', JSON.stringify(r.data.user));
        }
        window.location.replace('/');
      })
      .catch(function (e) {
        fail(e && e.message ? e.message : 'Сеть недоступна');
      });
  }

  function runBitrix() {
    var ms = initTimeoutMs();
    var initTimeout = window.setTimeout(function () {
      fail(timeoutFailMessage());
      fetchOAuthEnabled().then(function (enabled) {
        if (enabled) {
          showOAuthFallbackUi();
        }
      });
    }, ms);

    function callBx24Init() {
      BX24.init(function () {
        window.clearTimeout(initTimeout);
        if (typeof BX24.getAuth !== 'function') {
          fail('BX24.getAuth недоступен в этой версии портала.');
          return;
        }
        BX24.getAuth(function (auth) {
          if (!auth || !auth.access_token) {
            fail('Не удалось получить токен (BX24.getAuth).');
            return;
          }
          postSession(auth);
        });
      });
    }

    /**
     * BX24.ready ждёт готовность связи с порталом; в Маркете/части iframe она не наступает,
     * и init никогда не вызывается. Официальные примеры: ready перед init — см.
     * https://apidocs.bitrix24.com/sdk/bx24-js-sdk/system-functions/bx24-init.html
     * Добавляем таймаут: если ready «молчит», всё равно пробуем BX24.init (как в обсуждениях интеграторов).
     */
    var initScheduled = false;
    function scheduleBx24InitOnce() {
      if (initScheduled) {
        return;
      }
      initScheduled = true;
      window.setTimeout(callBx24Init, 0);
    }

    var READY_FALLBACK_MS = 5000;
    if (typeof BX24.ready === 'function') {
      var readyTimer = window.setTimeout(function () {
        if (typeof console !== 'undefined' && console.warn) {
          console.warn(
            '[HR Bitrix] BX24.ready не завершился за ' +
              READY_FALLBACK_MS +
              ' мс — вызываем BX24.init (обход для Маркета/зависшего handshake).'
          );
        }
        scheduleBx24InitOnce();
      }, READY_FALLBACK_MS);
      BX24.ready(function () {
        window.clearTimeout(readyTimer);
        scheduleBx24InitOnce();
      });
    } else {
      scheduleBx24InitOnce();
    }
  }

  function afterExternalScriptLoaded() {
    try {
      if (window.self === window.top) {
        fail(
          'Приложение должно открываться внутри портала Bitrix24 (во встроенной области), а не в отдельной вкладке.\n\n' +
          'Закройте эту вкладку и откройте: левое меню портала → «Приложения» → ваше приложение.'
        );
        return;
      }
    } catch (e) {
      /* cross-origin: считаем, что мы во вложении */
    }
    setStatus('Подключение к Bitrix24…' + bitrixInitHintSuffix());
    var tries = 0;
    function waitBx() {
      if (typeof BX24 !== 'undefined') {
        runBitrix();
        return;
      }
      tries += 1;
      if (tries > 80) {
        fail('SDK Bitrix24 не загружен. Откройте приложение из меню портала Bitrix24.');
        return;
      }
      window.setTimeout(waitBx, 50);
    }
    whenDomReady(waitBx);
  }

  window.__hrBitrixOnSdkLoad = function () {
    afterExternalScriptLoaded();
  };
  window.__hrBitrixOnSdkError = function () {
    fail('Не удалось загрузить скрипт Bitrix24 (сеть или блокировка).');
  };

  /**
   * Показывает OAuth как запасной вход сразу (не после таймаута), если API настроен.
   * Параллельно с BX24.init — пользователю не нужно ждать 60 с.
   */
  function setupOAuthFallbackLink() {
    try {
      if (!getDomainFromQuery()) {
        return;
      }
      fetchOAuthEnabled().then(function (enabled) {
        if (enabled) {
          showOAuthFallbackUi();
        }
      });
    } catch (e) {}
  }

  whenDomReady(setupOAuthFallbackLink);
})();
  </script>
  <script src="//api.bitrix24.com/api/v1/" onload="window.__hrBitrixOnSdkLoad()" onerror="window.__hrBitrixOnSdkError()"></script>
</body>
</html>
